<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<style>
    fieldset{ background:linear-gradient(azure, blue);
text-align: center;
width: 100;

font-size: 50px;
    }
    input{
        font-size: large;
    }
    .login{
        font-size: 60px;
    }
    
</style>
<body>

<form action="index.html">
    <fieldset>
        <legend>Login</legend>

        <label>Username:</label>
        <input type="text"><br><br>

        <label>Password:</label>
        <input type="password"><br><br>

        <input type="submit" value="Login" class="login">
    </fieldset>
</form>

</body>
</html>
